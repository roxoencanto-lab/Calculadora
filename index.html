<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Calculadora de Quilos e Valores - Roxo Encanto</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23FFA238"><path d="M13 12.18V4c0-.55-.45-1-1-1s-1 .45-1 1v8.18a3 3 0 0 0 0 5.64V20c0 .55.45 1 1 1s1-.45 1-1v-2.18a3 3 0 0 0 0-5.64ZM12 16c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1ZM6 6.18V4c0-.55-.45-1-1-1s-1 .45-1 1v2.18a3 3 0 0 0 0 5.64V20c0 .55.45 1 1 1s1-.45 1-1v-8.18a3 3 0 0 0 0-5.64ZM5 10c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1ZM22 9c0-1.3-.84-2.4-2-2.82V4c0-.55-.45-1-1-1s-1 .45-1 1v2.18a3 3 0 0 0 0 5.64V20c0 .55.45 1 1 1s1-.45 1-1v-8.18A3 3 0 0 0 22 9Zm-3 1c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1Z"/></svg>'
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Inter, sans-serif;
        background: #1a0a2e;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: linear-gradient(
          135deg,
          #571271 0,
          #3d1a4f 50%,
          #2a0f3a 100%
        );
        border-radius: 20px;
        padding: 32px 28px;
        width: 100%;
        max-width: 820px;
        display: flex;
        gap: 28px;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
        animation: fadeUp 0.5s ease-out both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .col-left {
        flex: 0 0 44%;
        display: flex;
        flex-direction: column;
      }
      .header {
        margin-bottom: 24px;
      }
      .header h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 4px;
        background: linear-gradient(135deg, #ffa238 0, #c4108b 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.4px;
      }
      .header p {
        font-size: 13px;
        color: #9e9e9e;
      }
      .field-group {
        margin-bottom: 16px;
      }
      .field-label {
        font-size: 10px;
        font-weight: 700;
        color: #b0bec5;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 7px;
        display: block;
      }
      .field-box {
        display: flex;
        background: rgba(20, 6, 35, 0.75);
        border: 1px solid rgba(255, 215, 0, 0.13);
        border-radius: 10px;
        overflow: hidden;
        transition: border-color 0.2s;
      }
      .field-box:focus-within {
        border-color: rgba(255, 215, 0, 0.45);
      }
      .field-box input {
        flex: 1;
        padding: 14px 16px;
        background: 0 0;
        border: none;
        font-size: 15px;
        color: #e0e0e0;
        font-family: "Geist Mono", monospace;
      }
      .field-box input::placeholder {
        color: #777777;
      }
      .field-box input:focus {
        outline: none;
        color: #e0e0e0;
      }
      .unit-sep {
        width: 1px;
        background: rgba(255, 215, 0, 0.13);
        margin: 10px 0;
        flex-shrink: 0;
      }
      .unit-badge {
        width: 110px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #ffa238;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        background: rgba(255, 215, 0, 0.06);
        border: 1px solid rgba(255, 215, 0, 0.1);
        border-left: none;
        border-radius: 0 12px 12px 0;
      }
      .col-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .total-box {
        flex: 1;
        background: rgba(255, 215, 0, 0.08);
        border: 1px solid rgba(255, 215, 0, 0.2);
        border-radius: 14px;
        padding: 18px 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .total-label {
        font-size: 12px;
        font-weight: 700;
        color: #d3d3d3;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        margin-bottom: 8px;
        text-align: center;
      }
      .content-wrapper {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        width: 100%;
      }
      .text-group {
        grid-column: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        white-space: nowrap;
      }
      .value-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .total-value {
        font-size: 28px;
        font-weight: 700;
        font-family: "Geist Mono", monospace;
        color: #c0c0c0;
        letter-spacing: -0.5px;
      }
      .copy-btn {
        background: rgba(255, 215, 0, 0.09);
        border: 1px solid rgba(255, 215, 0, 0.18);
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
        color: #ffa238;
        font-size: 11px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: all 0.2s;
        font-family: Inter, sans-serif;
        grid-column: 3;
        justify-self: start;
        margin-left: 12px;
      }
      .copy-btn:hover {
        background: rgba(255, 215, 0, 0.18);
        border-color: rgba(255, 215, 0, 0.35);
      }
      .copy-btn.copied {
        color: #4caf50;
        border-color: rgba(76, 175, 80, 0.35);
        background: rgba(76, 175, 80, 0.09);
      }
      @media (max-width: 620px) {
        .card {
          flex-direction: column;
        }
        .col-left {
          flex: unset;
        }
        .value-container {
          flex-direction: column;
          gap: 8px;
        }
      }
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      input[type="number"] {
        -moz-appearance: textfield;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="col-left">
        <div class="header">
          <h1>Calculadora Roxo</h1>
          <p>Quilos e Valores</p>
        </div>

        <div class="field-group">
          <label class="field-label">Peso da Unidade (1000g = 1Kg)</label>
          <div class="field-box">
            <input
              type="number"
              id="peso"
              placeholder="Peso em Gramas"
              min="0.01"
              step="0.01"
            />
            <div class="unit-sep"></div>
            <span class="unit-badge">Gramas (g)</span>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Valor da Unidade</label>
          <div class="field-box">
            <input
              type="text"
              id="valor"
              placeholder="Valor em Reais"
              inputmode="numeric"
            />
            <div class="unit-sep"></div>
            <span class="unit-badge">R$</span>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Quantidade de Unidades</label>
          <div class="field-box">
            <input
              type="number"
              id="qtd"
              placeholder="Unidades Compradas"
              min="1"
              step="1"
            />
            <div class="unit-sep"></div>
            <span class="unit-badge">UNID</span>
          </div>
        </div>
      </div>

      <div class="col-right">
        <div class="total-box">
          <span class="total-label">Valor Total Gasto</span>
          <div class="value-container">
            <div class="total-value" id="res-total">R$ 0,00</div>
          </div>
        </div>

        <div class="total-box">
          <div class="content-wrapper">
            <div class="text-group">
              <span class="total-label">Quilo Total</span>
              <div class="value-container">
                <div class="total-value" id="res-quilo">0,000 kg</div>
              </div>
            </div>
            <button class="copy-btn" id="copy-quilo" onclick="copiar('quilo')">
              <span class="copy-icon">⎘</span> Copiar
            </button>
          </div>
        </div>

        <div class="total-box">
          <div class="content-wrapper">
            <div class="text-group">
              <span class="total-label">Valor Quilo</span>
              <div class="value-container">
                <div class="total-value" id="res-vkg">R$ 0,000</div>
              </div>
            </div>
            <button class="copy-btn" id="copy-vkg" onclick="copiar('vkg')">
              <span class="copy-icon">⎘</span> Copiar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const pesoEl = document.getElementById("peso"),
        valorEl = document.getElementById("valor"),
        qtdEl = document.getElementById("qtd"),
        resQuilo = document.getElementById("res-quilo"),
        resVkg = document.getElementById("res-vkg"),
        resTotal = document.getElementById("res-total");

      function fmt3(t) {
        return t.toLocaleString("pt-BR", {
          minimumFractionDigits: 3,
          maximumFractionDigits: 3,
        });
      }

      function fmt2(t) {
        return t.toLocaleString("pt-BR", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      }

      function calc() {
        const t = parseFloat(pesoEl.value) || 0,
          e = parseFloat(valorEl.value) || 0,
          o = parseFloat(qtdEl.value) || 0,
          n = t / 1e3,
          a = Math.round(n * o * 1e3) / 1e3,
          i = n > 0 && e > 0 ? Math.round((e / n) * 1e3) / 1e3 : 0,
          l = Math.round(e * o * 100) / 100;

        resQuilo.textContent = fmt3(a) + " Kg";
        resVkg.textContent = "R$ " + fmt3(i);
        resTotal.textContent = "R$ " + fmt2(l);
      }

      function copiar(t) {
        const e = "quilo" === t ? resQuilo : resVkg;
        const o = document.getElementById("copy-" + t);

        const apenasNumero = e.textContent.replace(/[^\d.,]/g, "").trim();

        navigator.clipboard.writeText(apenasNumero).then(() => {
          o.classList.add("copied");
          o.innerHTML = '<span class="copy-icon">✓</span> Copiado!';
          setTimeout(() => {
            o.classList.remove("copied");
            o.innerHTML = '<span class="copy-icon">⎘</span> Copiar';
          }, 1800);
        });
      }

      // Função para aplicar a máscara de vírgula (Ex: 1250 -> 12,50)
      function mascaraMoeda(event) {
        let v = event.target.value.replace(/\D/g, ""); // Remove tudo o que não é dígito
        v = (v / 100).toFixed(2) + "";
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        event.target.value = v;
        calc(); // Chama o cálculo automaticamente
      }

      // No seu listener, adicione o evento para o campo valor
      valorEl.addEventListener("input", mascaraMoeda);

      // AJUSTE NA FUNÇÃO CALC:
      // Como o valor agora tem vírgula e pontos, precisamos converter de volta para número
      function calc() {
        // Converte "1.250,50" em "1250.50" para o JS calcular
        const valorLimpo = valorEl.value.replace(/\./g, "").replace(",", ".");

        const t = parseFloat(pesoEl.value) || 0,
          e = parseFloat(valorLimpo) || 0, // Usa o valor convertido
          o = parseFloat(qtdEl.value) || 0,
          n = t / 1e3,
          a = Math.round(n * o * 1e3) / 1e3,
          i = n > 0 && e > 0 ? Math.round((e / n) * 1e3) / 1e3 : 0,
          l = Math.round(e * o * 100) / 100;

        resQuilo.textContent = fmt3(a) + " Kg";
        resVkg.textContent = "R$ " + fmt3(i);
        resTotal.textContent = "R$ " + fmt2(l);
      }

      [pesoEl, valorEl, qtdEl].forEach((t) =>
        t.addEventListener("input", calc),
      );
      calc();
    </script>
  </body>
</html>
